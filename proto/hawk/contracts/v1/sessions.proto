syntax = "proto3";

package hawk.contracts.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/GrayCodeAI/hawk-core-contracts/gen/go/hawk/contracts/v1;contractsv1";

// Phase mirrors sessions.Phase (sessions/sessions.go) — the pipeline stage
// that generated a token-usage event. Go represents this as a STRING enum
// (type Phase string) whose zero value ("") already means "unknown", so
// PHASE_UNSPECIFIED=0 matches Go's own PhaseUnknown semantics exactly —
// no numeric-parity conflict here the way Severity/Risk have, since Go's
// Phase was never int-backed to begin with.
enum Phase {
  PHASE_UNSPECIFIED = 0;
  PHASE_LOCALIZE = 1;
  PHASE_REPAIR = 2;
  PHASE_VALIDATE = 3;
  PHASE_REVIEW = 4;
  PHASE_PLANNING = 5;
}

// ContextSnapshot mirrors sessions.ContextSnapshot — a point-in-time,
// compressed view of an agent's working memory.
message ContextSnapshot {
  string session_id = 1;
  Phase phase = 2;
  int32 token_count = 3;
  google.protobuf.Timestamp compressed_at = 4;
  string summary = 5;
  repeated string anchors = 6;
}

// ToolCallRecord mirrors sessions.ToolCallRecord — a single tool
// invocation within a session, tagged with its pipeline phase.
message ToolCallRecord {
  string session_id = 1;
  Phase phase = 2;
  string tool_name = 3;
  int32 input_tokens = 4;
  int32 output_tokens = 5;
  int64 duration_ms = 6;
  string error = 7;
  google.protobuf.Timestamp timestamp = 8;
}

// PhaseUsage mirrors sessions.PhaseUsage — token and cost usage for a
// single pipeline phase.
message PhaseUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 total_tokens = 3;
  double cost_usd = 4;
}

// CostAccumulator mirrors sessions.CostAccumulator — token/cost tracking
// across all pipeline phases within a session. by_phase is
// map<string, PhaseUsage> keyed by the Phase's actual string value (e.g.
// "localize") — unlike Severity (an int-kind Go type, see severity.proto),
// Phase's Kind is string, so Go's encoding/json already uses the phase
// name itself as the map key, not a numeric index. This is the one map in
// this schema that genuinely is string-keyed on the wire today.
message CostAccumulator {
  string session_id = 1;
  map<string, PhaseUsage> by_phase = 2;
  int32 total_tokens = 3;
  double total_cost_usd = 4;
}
