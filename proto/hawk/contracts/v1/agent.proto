syntax = "proto3";

package hawk.contracts.v1;

option go_package = "github.com/GrayCodeAI/hawk-core-contracts/gen/go/hawk/contracts/v1;contractsv1";

// SpawnRequest mirrors agent.SpawnRequest (agent/spawn.go).
// Canonical wire vocabulary for typed subagent spawn across hawk-eco.
message SpawnRequest {
  string prompt = 1;
  string description = 2;
  string subagent_type = 3;
  string capability_mode = 4;
  string isolation = 5;
  string resume_from = 6;
  string cwd = 7;
  string model = 8;
  bool background = 9;
  string thoroughness = 10;
  string parent_session = 11;
}

// SpawnResult mirrors agent.SpawnResult (agent/spawn.go).
message SpawnResult {
  string subagent_id = 1;
  string subagent_type = 2;
  string status = 3;
  string output = 4;
  string summary = 5;
  int32 tool_calls = 6;
  int32 turns = 7;
  int64 duration_ms = 8;
  string worktree_path = 9;
  string persona = 10;
  string error = 11;
}
