# Install: lefthook install
# Skip once: LEFTHOOK=0 git commit -m "..."

prepare-commit-msg:
  commands:
    strip-co-authored-by:
      run: |
        sed '/^[Cc]o-[Aa]uthored-[Bb]y:/d' "{1}" > "{1}.tmp" && mv "{1}.tmp" "{1}"

commit-msg:
  commands:
    strip-co-authored-by:
      run: |
        sed '/^[Cc]o-[Aa]uthored-[Bb]y:/d' "{1}" > "{1}.tmp" && mv "{1}.tmp" "{1}"
